<nav class="fixed w-full z-50 transition-all duration-300 futuristic-nav top-0 left-0">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-20">
      <!-- Logo -->
      <div class="flex-shrink-0">
        <a href="/#home" class="flex items-center gap-3 group">
          <span
            class="font-mono font-bold text-xl tracking-widest text-cyan-400 group-hover:text-white transition-colors duration-300 tech-glow">
            <span class="text-gray-500">&lt;</span>MARVELOUS<span class="text-gray-500">/&gt;</span><span
              class="blinking-cursor">_</span>
          </span>
        </a>
      </div>

      <!-- Desktop Menu -->
      <div class="hidden md:block">
        <div class="ml-10 flex items-baseline space-x-8 font-mono tracking-widest">
          {% for item in site.data.navigation %}
          <a href="{{ item.link | relative_url }}"
            class="nav-link relative text-gray-400 hover:text-cyan-400 px-3 py-2 text-sm uppercase transition-all duration-300">
            {{ item.name }}
          </a>
          {% endfor %}
        </div>
      </div>

      <!-- Mobile menu button -->
      <div class="md:hidden flex items-center">
        <button id="menuBtn" onclick="navToggle()"
          class="inline-flex items-center justify-center p-2 text-white hover:text-white focus:outline-none transition-colors duration-300 border border-transparent hover:border-cyan-400 rounded-sm"
          aria-expanded="false">
          <span class="sr-only">Open main menu</span>
          <!-- Icon when menu is closed -->
          <svg id="menuIconOpen" class="block h-6 w-6 transition-opacity duration-300"
            xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="square" stroke-linejoin="miter" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
          <!-- Icon when menu is open -->
          <svg id="menuIconClose" class="hidden h-6 w-6 transition-opacity duration-300"
            xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="square" stroke-linejoin="miter" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div id="mobileMenu" class="md:hidden futuristic-mobile-nav absolute w-full border-b border-cyan-500">
    <div class="px-4 pt-2 pb-6 space-y-1 sm:px-3 flex flex-col items-center font-mono tracking-widest">
      {% for item in site.data.navigation %}
      <a href="{{ item.link | relative_url }}"
        class="mobile-nav-link text-gray-400 hover:text-cyan-400 hover:bg-gray-900/50 block px-3 py-4 text-base uppercase w-full text-center border-b border-gray-800 last:border-0 transition-all duration-200">
        > {{ item.name }}
      </a>
      {% endfor %}
    </div>
  </div>
</nav>
